<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/rugged.css">
</head>
<body class="user-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">書籍管理システム</span>
            <span class="navbar-text text-white ms-auto">
                ユーザー: <span th:text="${#authentication.name}"></span>
            </span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="alert alert-info" role="alert">
            <h4>マイページ</h4>
            <p>書籍の予約・確認ができます。</p>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">メニュー</h5>
            </div>
            <div class="card-body">
                <ul class="list-group">
                    <li class="list-group-item">
                        <a th:href="@{/user/reserve}">書籍を予約する</a>
                    </li>
                    <li class="list-group-item">
                        <a th:href="@{/user/reserve/list}">自分の予約一覧</a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="mt-3">
            <form th:action="@{/auth/logout}" method="post">
                <button type="submit" class="btn btn-secondary">ログアウト</button>
            </form>
        </div>
    </div>

    <script src="/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
