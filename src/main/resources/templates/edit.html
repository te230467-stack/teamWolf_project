<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>書籍編集</title>

    <link rel="stylesheet" href="/css/edit.css" th:href="@{/css/edit.css}">
</head>
<body>
    <h1>書籍編集</h1>

    <form th:action="@{/reserve/edit/{id}(id=${reserve.id})}" method="post">
        <div class="form-group">
            <label>タイトル:</label>
            <input type="text" name="title" th:value="${reserve.title}" required>
        </div>
        <div class="form-group">
            <label>著者:</label>
            <input type="text" name="author" th:value="${reserve.author}" required>
        </div>
        <div class="form-group">
            <label>出版社:</label>
            <input type="text" name="publisher" th:value="${reserve.publisher}" required>
        </div>
        <!--
            <div class="form-group">
                <label>電話番号:</label>
                <input type="text" name="phone" th:value="${book.phone}" required>
            </div>
            -->
        <button type="submit" class="update-btn">更新</button>
        <a th:href="@{/reserve}">
            <button type="button" class="back-btn">戻る</button>
        </a>
    </form>
</body>
</html>
