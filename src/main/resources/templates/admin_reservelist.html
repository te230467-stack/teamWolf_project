<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約一覧</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">予約書籍</h5>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>タイトル</th>
                            <th>著者</th>
                            <th>出版社</th>
                            <th>user_id</th>
                            <th>username</th>
                            <th>e-mail</th>
                            <th>TEL</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="reserve : ${reserves}">
                            <td th:text="${reserve.title}"></td>
                            <td th:text="${reserve.author}"></td>
                            <td th:text="${reserve.publisher}"></td>
                            <td th:text="${reserve.user.id}"></td>
                            <td th:text="${reserve.user.username}"></td>
                            <td th:text="${reserve.user.userProfile.email}"></td>
                            <td th:text="${reserve.user.userProfile.phonenumber}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div> <script src="/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
