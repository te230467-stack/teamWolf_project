<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/rugged.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">書籍管理システム</span>
            <span class="navbar-text text-white ms-auto">
                ユーザー: <span th:text="${#authentication.name}"></span>
                （管理者）
            </span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="alert alert-warning" role="alert">
            <h4>管理者専用ページ</h4>
            <p>このページは管理ユーザーのみがアクセスできます。</p>
        </div>

        <div class="card">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">管理機能</h5>
            </div>
            <div class="card-body">
                <ul class="list-group">
                    <li class="list-group-item">
                        <a th:href="@{/admin/users}">ユーザー管理</a>
                    </li>
                    <li class="list-group-item">
                        <a th:href="@{/admin/logs}">システムログ</a>
                    </li>
                    <li class="list-group-item">
                        <a th:href="@{/admin/settings}">システム設定</a>
                    </li>
                    <li class="list-group-item">
                        <a th:href="@{/admin/reserves}">予約一覧</a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="mt-3 d-flex align-items-center">
            <a th:href="@{/books}" class="btn btn-secondary">戻る</a>
            
            <form th:action="@{/logout}" method="post" class="ms-2">
                <button type="submit" class="btn btn-outline-danger">ログアウト</button>
            </form>
        </div>
    </div>

    <script src="/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
